name: parity_gate

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

jobs:
  oracle-bundle:
    runs-on: ubuntu-22.04
    env:
      HAXE_VERSION: "4.3.4"
      HASHLINK_VERSION: "1.14"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install HashLink (pinned)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libmbedtls-dev \
            libsdl2-dev \
            libpng-dev \
            zlib1g-dev \
            libturbojpeg0-dev \
            libvorbis-dev \
            libopenal-dev \
            libuv1-dev
          git clone --depth 1 --branch "${HASHLINK_VERSION}" https://github.com/HaxeFoundation/hashlink.git /tmp/hashlink
          make -C /tmp/hashlink -j"$(nproc)"
          sudo make -C /tmp/hashlink install
          sudo ldconfig
          hl --version

      - name: Generate parity oracle bundle
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            ./scripts/generate_parity_oracle.py --repo-root . --out-dir target/parity-oracle --include-slow
          else
            ./scripts/generate_parity_oracle.py --repo-root . --out-dir target/parity-oracle
          fi

      - name: Upload parity oracle for this workflow run
        uses: actions/upload-artifact@v4
        with:
          name: parity-oracle-current
          path: target/parity-oracle
          if-no-files-found: error
          retention-days: 7

  parity-interp:
    runs-on: ubuntu-22.04
    needs: oracle-bundle
    env:
      HAXE_VERSION: "4.3.4"
      LLVM_SYS_180_PREFIX: "/usr/lib/llvm-18"
      ASH_PARITY_REQUIRE_ORACLE: "1"
      ASH_PARITY_ORACLE_DIR: "target/parity-oracle"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install LLVM 18 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18

      - name: Download parity oracle for this run
        uses: actions/download-artifact@v4
        with:
          name: parity-oracle-current
          path: target/parity-oracle

      - name: Run parity matrix (interp)
        run: cargo test -p ash_cli --test parity_matrix parity_matrix_interp -- --nocapture

  parity-hybrid:
    runs-on: ubuntu-22.04
    needs: oracle-bundle
    env:
      HAXE_VERSION: "4.3.4"
      LLVM_SYS_180_PREFIX: "/usr/lib/llvm-18"
      ASH_PARITY_REQUIRE_ORACLE: "1"
      ASH_PARITY_ORACLE_DIR: "target/parity-oracle"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install LLVM 18 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18

      - name: Download parity oracle for this run
        uses: actions/download-artifact@v4
        with:
          name: parity-oracle-current
          path: target/parity-oracle

      - name: Run parity matrix (hybrid default)
        run: cargo test -p ash_cli --test parity_matrix parity_matrix_hybrid_default -- --nocapture

      - name: Run parity matrix (hybrid promotion-heavy)
        run: cargo test -p ash_cli --test parity_matrix parity_matrix_hybrid_promotion_heavy -- --nocapture

  parity-nightly-slow:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-22.04
    needs: oracle-bundle
    env:
      HAXE_VERSION: "4.3.4"
      LLVM_SYS_180_PREFIX: "/usr/lib/llvm-18"
      ASH_PARITY_REQUIRE_ORACLE: "1"
      ASH_PARITY_ORACLE_DIR: "target/parity-oracle"
      ASH_PARITY_INCLUDE_SLOW: "1"
      ASH_PARITY_SLOW_TIMEOUT_SECS: "360"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install LLVM 18 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18

      - name: Download parity oracle for this run
        uses: actions/download-artifact@v4
        with:
          name: parity-oracle-current
          path: target/parity-oracle

      - name: Run parity matrix (slow nightly)
        run: cargo test -p ash_cli --test parity_matrix -- --nocapture

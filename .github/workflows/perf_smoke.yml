name: perf_smoke

on:
  workflow_dispatch:
    inputs:
      include_slow:
        description: "Include slow case (Mandelbrot)"
        required: false
        default: "false"
      min_speedup:
        description: "Optional minimum interp/hybrid median speedup threshold"
        required: false
        default: "0"
  schedule:
    - cron: "0 7 * * *"

jobs:
  perf:
    runs-on: ubuntu-22.04
    env:
      HAXE_VERSION: "4.3.4"
      LLVM_SYS_180_PREFIX: "/usr/lib/llvm-18"
      CARGO_BUILD_TARGET: "x86_64-unknown-linux-gnu"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@nightly

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install LLVM 18 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gpg software-properties-common
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 18 all
          llvm-config-18 --version
          clang-18 --version

      - name: Build embedded stdlib cdylib
        run: cargo build -p ash_std --target "${CARGO_BUILD_TARGET}"

      - name: Run perf smoke matrix
        run: |
          INCLUDE_SLOW="false"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            INCLUDE_SLOW="true"
          elif [[ "${{ github.event.inputs.include_slow || 'false' }}" == "true" ]]; then
            INCLUDE_SLOW="true"
          fi

          MIN_SPEEDUP="${{ github.event.inputs.min_speedup || '0' }}"

          if [[ "$INCLUDE_SLOW" == "true" ]]; then
            ./scripts/run_perf_matrix.py \
              --repo-root . \
              --out-json target/perf/perf_smoke.json \
              --iterations 5 \
              --warmups 1 \
              --include-slow \
              --min-speedup "$MIN_SPEEDUP"
          else
            ./scripts/run_perf_matrix.py \
              --repo-root . \
              --out-json target/perf/perf_smoke.json \
              --iterations 5 \
              --warmups 1 \
              --min-speedup "$MIN_SPEEDUP"
          fi

      - name: Upload perf smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-${{ github.run_id }}
          path: target/perf/perf_smoke.json
          if-no-files-found: error
          retention-days: 14
